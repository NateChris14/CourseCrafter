<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}CourseCrafter{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar">
      <div class="container navbar-content">
        <a href="{% if user %}/dashboard{% else %}/{% endif %}" class="navbar-brand">CourseCrafter</a>
        <div class="navbar-nav">
          {% if user %}
            <a href="/courses" class="btn btn-secondary btn-sm">My Courses</a>
            <div id="genPanel" style="position:relative;">
              <span id="genBadge" class="btn btn-icon" style="display:none; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">⚡ <span id="genCount">0</span></span>
              <div id="genDetails" style="display:none; position:absolute; top:100%; right:0; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-lg); min-width:320px; max-width:400px; max-height:400px; overflow-y:auto; z-index:1000; padding:16px; margin-top:8px;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:16px;">
                  <h4 style="margin:0;">Generating...</h4>
                  <button onclick="cancelAllGenerations()" class="btn btn-sm btn-danger">Cancel All</button>
                </div>
                <div id="genList"></div>
              </div>
            </div>
            <div id="queuePanel" style="position:relative;">
              <span id="queueBadge" class="btn btn-sm" style="background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%); color: white; border: 1px solid #4a5568;">Queue: <span id="queueCount">0</span></span>
              <div id="queueDetails" style="display:none; position:absolute; top:100%; right:0; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-lg); min-width:360px; max-width:450px; max-height:500px; overflow-y:auto; z-index:1000; padding:16px; margin-top:8px;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:16px;">
                  <h4 style="margin:0;">Active Jobs</h4>
                  <div class="flex gap-2">
                    <button onclick="clearPending()" id="clearPendingBtn" class="btn btn-sm" style="background:var(--warning); color:white;">Clear Pending</button>
                    <button onclick="clearAll()" id="clearAllBtn" class="btn btn-sm btn-danger">Stop All</button>
                  </div>
                </div>
                <div id="processingList"></div>
                <div id="pendingList" style="margin-top:16px;"></div>
              </div>
            </div>
            <form method="post" action="/logout" style="display:inline;">
              <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
            </form>
          {% else %}
            <a href="/login" class="btn btn-secondary btn-sm">Login</a>
            <a href="/register" class="btn btn-primary btn-sm">Register</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container" style="padding-top: 24px;">
      {% block content %}{% endblock %}
    </main>

    {% if user %}
    <script>
      // Queue status panel
      const queueBadge = document.getElementById('queueBadge');
      const queueDetails = document.getElementById('queueDetails');
      let panelOpen = false;

      if (queueBadge) {
        queueBadge.addEventListener('click', () => {
          panelOpen = !panelOpen;
          queueDetails.style.display = panelOpen ? 'block' : 'none';
        });
      }

      function formatJobType(type) {
        if (type === 'generate_roadmap_outline') return '📋 Roadmap';
        if (type === 'generate_course_modules') return '📚 Course';
        return type;
      }

      function createJobItem(task, isProcessing) {
        const progress = task.progress || 0;
        const status = task.run_status || 'queued';
        let message = task.message;
        
        // Create better fallback message
        if (!message || message.trim() === '') {
          if (isProcessing) {
            message = `Processing... ${progress}%`;
          } else {
            message = 'Waiting to start';
          }
        }
        
        // Access run_id from nested task structure
        const taskData = task.task || {};
        const runId = taskData.run_id || '';
        const canCancel = isProcessing || !isProcessing; // Can cancel both pending and processing

        return `
          <div style="margin-bottom:12px; padding:8px; background:var(--bg-tertiary); border-radius:6px; border: 1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
              <span style="font-weight:600; font-size:0.9em; color:var(--text-primary);">${formatJobType(taskData.type)}</span>
              <div>
                <span style="font-size:0.8em; color:${isProcessing ? 'var(--primary-light)' : 'var(--text-muted)'}; margin-right:8px;">${isProcessing ? '● ' + status : '○ queued'}</span>
                ${canCancel ? `<button onclick="cancelJob('${runId}')" style="font-size:0.7em; padding:2px 6px; background:var(--error); color:white; border:none; border-radius:3px; cursor:pointer;">✕</button>` : ''}
              </div>
            </div>
            <div style="font-size:0.8em; color:var(--text-secondary); margin-bottom:6px;">${message}</div>
            <div style="background:var(--bg-secondary); border-radius:4px; height:6px; overflow:hidden; border: 1px solid var(--border);">
              <div style="background:${isProcessing ? 'linear-gradient(90deg, var(--primary), var(--primary-light))' : 'var(--bg-tertiary)'}; height:100%; width:${progress}%; transition:width 0.3s;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:4px;">
              <span style="font-size:0.75em; color:var(--text-muted); font-weight:600;">${progress}%</span>
              ${runId ? `<a href="/courses?run=${runId}" style="font-size:0.75em; color:var(--primary-light);">View</a>` : ''}
            </div>
          </div>
        `;
      }

      async function cancelJob(runId) {
        if (!confirm('Cancel this job?')) return;
        try {
          const res = await fetch(`/generation/runs/${runId}/cancel`, { method: 'POST' });
          const data = await res.json();
          if (data.ok) {
            updateQueueStatus();
          } else {
            alert('Failed to cancel: ' + (data.error || 'Unknown error'));
          }
        } catch (e) {
          alert('Failed to cancel job');
        }
      }

      async function clearPending() {
        if (!confirm('Clear all pending jobs?')) return;
        try {
          const res = await fetch('/generation/queue/clear-pending', { method: 'POST' });
          const data = await res.json();
          if (data.ok) {
            updateQueueStatus();
          }
        } catch (e) {
          alert('Failed to clear pending queue');
        }
      }

      async function clearAll() {
        if (!confirm('Stop ALL jobs? This will cancel both pending and currently processing jobs.')) return;
        try {
          const res = await fetch('/generation/queue/clear-all', { method: 'POST' });
          const data = await res.json();
          if (data.ok) {
            updateQueueStatus();
          }
        } catch (e) {
          alert('Failed to clear queue');
        }
      }

      async function updateQueueStatus() {
        try {
          const res = await fetch('/generation/queue/status');
          const data = await res.json();

          const pendingCount = data.pending_count || 0;
          const processingCount = data.processing_count || 0;
          const totalCount = pendingCount + processingCount;

          // Update badge
          const countEl = document.getElementById('queueCount');
          if (countEl) {
            countEl.textContent = totalCount;
            if (totalCount > 0) {
              queueBadge.style.background = 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)';
              queueBadge.style.color = 'white';
              queueBadge.style.borderColor = '#f59e0b';
            } else {
              queueBadge.style.background = 'linear-gradient(135deg, #2d3748 0%, #1a202c 100%)';
              queueBadge.style.color = 'white';
              queueBadge.style.borderColor = '#4a5568';
            }
          }

          // Update processing list
          const processingList = document.getElementById('processingList');
          if (processingList) {
            if (data.processing && data.processing.length > 0) {
              processingList.innerHTML = '<h5 style="margin:0 0 8px 0; color:var(--primary-light); font-weight:600;">Processing</h5>' +
                data.processing.map(t => createJobItem(t, true)).join('');
            } else {
              processingList.innerHTML = '';
            }
          }

          // Update pending list
          const pendingList = document.getElementById('pendingList');
          if (pendingList) {
            if (data.pending && data.pending.length > 0) {
              pendingList.innerHTML = '<h5 style="margin:0 0 8px 0; color:var(--text-muted); font-weight:600;">Pending (' + data.pending.length + ')</h5>' +
                data.pending.map(t => createJobItem(t, false)).join('');
            } else {
              pendingList.innerHTML = '';
            }
          }

          // Auto-hide panel if empty
          if (totalCount === 0 && panelOpen) {
            panelOpen = false;
            queueDetails.style.display = 'none';
          }
        } catch (e) {
          // Silently fail
        }
      }

      // Update every 1 second for smoother progress
      setInterval(updateQueueStatus, 1000);
      updateQueueStatus();

      // Global generation progress indicator
      const genBadge = document.getElementById('genBadge');
      const genDetails = document.getElementById('genDetails');
      let genPanelOpen = false;

      if (genBadge) {
        genBadge.addEventListener('click', () => {
          genPanelOpen = !genPanelOpen;
          genDetails.style.display = genPanelOpen ? 'block' : 'none';
        });
      }

      function createGenItem(run) {
        const isProcessing = run.status === 'processing';
        const progress = run.progress || 0;
        const entityType = run.course_id ? 'Course' : 'Roadmap';
        const entityId = run.course_id || run.roadmap_id;

        return `
          <div style="margin-bottom:12px; padding:10px; background:#f8f8f8; border-radius:6px; border-left:3px solid ${isProcessing ? '#4CAF50' : '#ff9800'};">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
              <span style="font-weight:600; font-size:0.9em;">${entityType} Generation</span>
              <div>
                <span style="font-size:0.75em; padding:2px 6px; background:${isProcessing ? '#4CAF50' : '#ff9800'}; color:white; border-radius:3px; margin-right:6px;">${run.status}</span>
                <button onclick="cancelGeneration('${run.id}')" style="font-size:0.7em; padding:2px 6px; background:#f44336; color:white; border:none; border-radius:3px; cursor:pointer;">✕</button>
              </div>
            </div>
            <div style="font-size:0.8em; color:#666; margin-bottom:8px;">${run.message || 'Processing...'}</div>
            <div style="background:#e0e0e0; border-radius:4px; height:8px; overflow:hidden;">
              <div style="background:linear-gradient(90deg, #4CAF50, #8BC34A); height:100%; width:${progress}%; transition:width 0.3s;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:4px;">
              <span style="font-size:0.75em; color:#666; font-weight:600;">${progress}%</span>
              ${run.course_id ? `<a href="/courses/${run.course_id}?run=${run.id}" style="font-size:0.75em;">View →</a>` : ''}
            </div>
          </div>
        `;
      }

      async function cancelGeneration(runId) {
        if (!confirm('Cancel this generation?')) return;
        try {
          const res = await fetch(`/generation/runs/${runId}/cancel`, { method: 'POST' });
          const data = await res.json();
          if (data.ok) {
            updateGenStatus();
          }
        } catch (e) {
          alert('Failed to cancel generation');
        }
      }

      async function cancelAllGenerations() {
        if (!confirm('Cancel all active generations?')) return;
        try {
          const res = await fetch('/generation/runs');
          const runs = await res.json();
          for (const run of runs) {
            await fetch(`/generation/runs/${run.id}/cancel`, { method: 'POST' });
          }
          updateGenStatus();
        } catch (e) {
          alert('Failed to cancel generations');
        }
      }

      async function updateGenStatus() {
        try {
          const res = await fetch('/generation/runs');
          const runs = await res.json();
          const activeRuns = runs.filter(r => r.status === 'queued' || r.status === 'processing');

          // Update badge
          if (genBadge) {
            const countEl = document.getElementById('genCount');
            if (activeRuns.length > 0) {
              genBadge.style.display = 'inline-block';
              countEl.textContent = activeRuns.length;
              genBadge.style.background = activeRuns.some(r => r.status === 'processing') ? '#fff3cd' : '#e3f2fd';
            } else {
              genBadge.style.display = 'none';
              genPanelOpen = false;
              genDetails.style.display = 'none';
            }
          }

          // Update list
          const genList = document.getElementById('genList');
          if (genList) {
            if (activeRuns.length > 0) {
              genList.innerHTML = activeRuns.map(r => createGenItem(r)).join('');
            } else {
              genList.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">No active generations</div>';
            }
          }

          // Update local progress if page has a function for it
          if (typeof window.updateLocalProgress === 'function') {
            const params = new URLSearchParams(window.location.search);
            const currentRunId = params.get('run');
            if (currentRunId) {
              const currentRun = runs.find(r => r.id === currentRunId);
              if (currentRun) {
                window.updateLocalProgress(currentRun);
                
                // Auto-refresh when generation completes
                if (currentRun.status === 'succeeded' || currentRun.status === 'failed') {
                  setTimeout(() => {
                    window.location.reload();
                  }, 2000); // Wait 2 seconds before refresh
                }
              }
            }
          }
        } catch (e) {
          // Silently fail
        }
      }

      // Update every 1 second for better responsiveness
      setInterval(updateGenStatus, 1000);
      updateGenStatus();
    </script>
    {% endif %}
  </body>
</html>
