{% extends "base.html" %}
{% block content %}
<h1>{{ roadmap.title }}</h1>
<p><b>Field:</b> {{ roadmap.field }} | <b>Level:</b> {{ roadmap.level }} | <b>Weeks:</b> {{ roadmap.duration_weeks }}</p>

<form method="post" action="/generation/roadmaps/{{ roadmap.id }}/generate">
  <button type="submit" class="btn btn-primary">
    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
    </svg>
    Generate Outline
  </button>
  <button type="button" onclick="location.reload()" class="btn btn-secondary" style="margin-left: 8px;">
    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
    </svg>
    Refresh
  </button>
</form>

<div id="runBox" class="card" style="margin-top:24px; display:none;">
  <div style="padding: 20px;">
    <h3 style="margin: 0 0 16px 0;">Generation Progress</h3>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
      <div>
        <span style="color: var(--text-secondary); font-size: 0.9rem;">Status:</span>
        <span id="status" style="margin-left: 8px; font-weight: 600;"></span>
      </div>
      <div>
        <span style="color: var(--text-secondary); font-size: 0.9rem;">Progress:</span>
        <span id="progress" style="margin-left: 8px; font-weight: 600;"></span>%
      </div>
    </div>
    
    <div style="background: #e0e0e0; border-radius: 4px; height: 6px; margin-bottom: 16px; overflow: hidden;">
      <div id="progressBar" style="background: #4CAF50; height: 100%; width: 0%; transition: width 0.3s;"></div>
    </div>
    
    <div id="message" style="color: var(--text-secondary); margin-bottom: 16px;"></div>
    <div id="actions" style="margin: 16px 0;"></div>

    <div id="outline"></div>

    <details style="margin-top: 16px;">
      <summary style="cursor: pointer; color: var(--text-secondary);">Show raw JSON</summary>
      <pre id="result" style="background: var(--bg-tertiary); padding: 12px; border-radius: var(--radius-sm); margin-top: 8px; white-space:pre-wrap; font-size: 0.9rem;"></pre>
    </details>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const runId = params.get("run");
  const box = document.getElementById("runBox");
  const actions = document.getElementById("actions");
  const outlineDiv = document.getElementById("outline");
  const progressBar = document.getElementById("progressBar");

  function renderOutline(outline) {
    outlineDiv.innerHTML = "";
    const weeks = outline?.weeks || [];
    if (!weeks.length) {
      outlineDiv.innerHTML = "<p style='color: var(--text-secondary);'><i>No outline weeks found.</i></p>";
      return;
    }

    weeks.sort((a, b) => (a.week ?? 0) - (b.week ?? 0));

    for (const w of weeks) {
      const section = document.createElement("section");
      section.className = "card";
      section.style.margin = "16px 0";
      section.style.padding = "20px";

      const h2 = document.createElement("h2");
      h2.textContent = `Week ${w.week} — ${w.title}`;
      h2.style.margin = "0 0 12px 0";
      section.appendChild(h2);

      const ul = document.createElement("ul");
      ul.style.margin = "0";
      for (const o of (w.outcomes || [])) {
        const li = document.createElement("li");
        li.textContent = o;
        ul.appendChild(li);
      }
      section.appendChild(ul);

      outlineDiv.appendChild(section);
    }
  }

  // Listen for global generation updates
  function updateLocalProgress(runData) {
    if (!runData || runData.id !== runId) return;
    
    document.getElementById("status").textContent = runData.status;
    document.getElementById("progress").textContent = runData.progress ?? 0;
    progressBar.style.width = `${runData.progress ?? 0}%`;
    document.getElementById("message").textContent = runData.message ?? "";

    if (runData.status === "succeeded") {
      actions.innerHTML = "";

      if (runData.course_id) {
        const link = document.createElement("a");
        link.href = `/courses/${runData.course_id}`;
        link.className = "btn btn-primary";
        link.innerHTML = `
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
          </svg>
          View Course
        `;
        actions.appendChild(link);
      }

      document.getElementById("result").textContent = runData.result_json || "";

      try {
        const outline = JSON.parse(runData.result_json);
        renderOutline(outline);
      } catch (e) {
        outlineDiv.innerHTML = "<p style='color: var(--error);'><i>Could not parse outline JSON.</i></p>";
      }
      return;
    }

    if (runData.status === "failed") {
      outlineDiv.innerHTML = "";
      document.getElementById("result").textContent = runData.error || "Failed";
      actions.innerHTML = "";
      return;
    }
  }

  // Make updateLocalProgress globally accessible so base.html can call it
  window.updateLocalProgress = updateLocalProgress;

  if (runId) {
    box.style.display = "block";
    
    // Initial poll
    async function initialPoll() {
      try {
        const res = await fetch(`/generation/runs/${runId}`);
        const data = await res.json();
        updateLocalProgress(data);
        
        // If still running, let global monitoring take over
        if (data.status !== "succeeded" && data.status !== "failed") {
          // Global monitoring will handle further updates
        }
      } catch (e) {
        console.error("Failed to poll run status:", e);
      }
    }
    
    initialPoll();
  }
</script>
{% endblock %}
