name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest
        services:
          postgres:
            image: postgres:15
            env:
              POSTGRES_PASSWORD: coursecrafter
              POSTGRES_USER: coursecrafter
              POSTGRES_DB: coursecrafter
            options: >-
              --health-cmd pg_isready
              --health-interval 10s
              --health-timeout 5s
              --health-retries 5
            ports:
              - 5432:5432
          redis:
            image: redis:7
            options: >-
              --health-cmd "redis-cli ping"
              --health-interval 10s
              --health-timeout 5s
              --health-retries 5
            ports:
              - 6379:6379

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'

            - name: Set up uv
              uses: astral-sh/setup-uv@v4

            - name: Install dependencies
              run: |
                uv sync --all-extras --dev

            - name: Run tests
              env: 
                PYTHONPATH: ${{ github.workspace }}
                DATABASE_URL: postgresql+psycopg://coursecrafter:coursecrafter@localhost:5432/coursecrafter
                REDIS_URL: redis://localhost:6379/0
                GROQ_API_KEY: dummy_key_for_testing
                LLM_PROVIDER: groq
                GROQ_BASE_URL: https://api.groq.com/openai/v1
                GROQ_MODEL: llama-3.1-8b-instant
                SESSION_SECRET: test-secret-key-for-ci
              run: |
                uv run pytest -v --cov=app --cov-report=xml