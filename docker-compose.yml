services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: coursecrafter
      POSTGRES_USER: coursecrafter
      POSTGRES_PASSWORD: coursecrafter
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-north-1
        awslogs-group: /coursecrafter/prod
        awslogs-stream: db
        awslogs-create-group: "true"

  redis:
    image: redis:7
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-north-1
        awslogs-group: /coursecrafter/prod
        awslogs-stream: redis
        awslogs-create-group: "true"

  web:
    image: ${ECR_IMAGE}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --log-level debug --access-log
    environment:
      DATABASE_URL: postgresql+psycopg://coursecrafter:coursecrafter@db:5432/coursecrafter
      REDIS_URL: redis://redis:6379/0
      ENV: production
      SESSION_SECRET: ${session_secret}
      LLM_PROVIDER: groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: https://api.groq.com/openai/v1
      GROQ_MODEL: llama-3.1-8b-instant
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - db
      - redis
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-north-1
        awslogs-group: /coursecrafter/prod
        awslogs-stream: web
        awslogs-create-group: "true"

  worker:
    image: ${ECR_IMAGE}
    command: python -m app.jobs.worker
    environment:
      DATABASE_URL: postgresql+psycopg://coursecrafter:coursecrafter@db:5432/coursecrafter
      REDIS_URL: redis://redis:6379/0
      ENV: production
      SESSION_SECRET: ${session_secret}
      LLM_PROVIDER: groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: https://api.groq.com/openai/v1
      GROQ_MODEL: llama-3.1-8b-instant
    restart: unless-stopped
    depends_on:
      - db
      - redis
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-north-1
        awslogs-group: /coursecrafter/prod
        awslogs-stream: worker
        awslogs-create-group: "true"

volumes:
  pgdata:
